input {
    # Laptop
    kb_layout = br,us
    kb_variant = abnt2,intl
    kb_options = grp:win_space_toggle

    # force_no_accel = true
    accel_profile = flat
    sensitivity = 1
    numlock_by_default = true
    focus_on_close = 1

    touchpad {
        natural_scroll = true
        disable_while_typing = false
        scroll_factor = 0.3
    }
}
